name: push

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  macos-build:
    runs-on: macos-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run support package tests
        run: HOME=/tmp SWIFTPM_ENABLE_PLUGIN_LOADING=0 CLANG_MODULE_CACHE_PATH=/tmp/clang-module-cache swift test --package-path apps/native-macos/LoopBrowserNativeSupport

      - name: Run native app tests
        run: HOME=/tmp xcodebuild -project apps/native-macos/LoopBrowserNative.xcodeproj -scheme LoopBrowserNative -destination 'platform=macOS,arch=arm64' CODE_SIGN_IDENTITY="-" CODE_SIGNING_ALLOWED=YES test

      - name: Package macOS artifact
        run: ./scripts/package-native-mac.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: loop-browser-macos-${{ github.sha }}
          path: |
            output/Loop Browser-macOS.zip
            output/Loop Browser.app/**
          if-no-files-found: error
          retention-days: 14
